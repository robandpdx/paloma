apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paloma.backendName" . }}
  labels:
    {{- include "paloma.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "paloma.backendName" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "paloma.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ include "paloma.backendName" . }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5005
          env:
            - name: PORT
              value: {{ .Values.backend.env.port | quote }}
            - name: MONGODB_URI
              value: {{ .Values.backend.env.mongoUri | quote }}
            - name: TARGET_ORGANIZATION
              value: {{ .Values.backend.env.targetOrganization | quote }}
            - name: MODE
              value: {{ .Values.backend.env.mode | quote }}
            - name: GHES_API_URL
              value: {{ .Values.backend.env.ghesApiUrl | quote }}
            - name: CORS_ORIGIN
              value: {{ .Values.backend.env.corsOrigin | quote }}
            - name: SOURCE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "paloma.secretName" . }}
                  key: {{ .Values.backend.secrets.sourceAdminTokenKey }}
            - name: TARGET_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "paloma.secretName" . }}
                  key: {{ .Values.backend.secrets.targetAdminTokenKey }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "paloma.backendName" . }}
  labels:
    {{- include "paloma.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "paloma.backendName" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http